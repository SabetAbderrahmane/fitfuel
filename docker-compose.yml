services:
  db:
    image: postgres:17-alpine
    container_name: fitfuel-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: fitfuel
      POSTGRES_USER: fitfuel
      POSTGRES_PASSWORD: 1234567890
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fitfuel} -d ${POSTGRES_DB:-fitfuel}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
